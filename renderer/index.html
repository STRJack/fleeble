<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="mascot-container" class="hidden">
    <div id="mascot" class="mascot">
      <div class="mascot-scene">
        <div class="buddy">
          <!-- Antenna -->
          <div class="antenna">
            <div class="antenna-stem"></div>
            <div class="antenna-tip"></div>
          </div>

          <!-- Body -->
          <div class="buddy-body">
            <!-- Eyes -->
            <div class="eye left-eye">
              <div class="pupil"></div>
            </div>
            <div class="eye right-eye">
              <div class="pupil"></div>
            </div>
          </div>

          <!-- Arms -->
          <div class="arm left-arm"></div>
          <div class="arm right-arm"></div>
        </div>
      </div>

      <!-- Notification badge -->
      <div class="notif-badge" id="notif-badge">!</div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
